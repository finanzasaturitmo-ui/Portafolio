<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;font-size:13px}
:root{--g:#3fb950;--r:#f78166;--b:#58a6ff;--border:#21262d;--card:#161b22;--sub:#8b949e}

/* PANTALLA DE LOGIN */
#login-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #0d1117; display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 9999;
}
.btn-google {
  background: #ffffff; color: #1f2328; border: none; padding: 12px 24px;
  border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer;
  margin-top: 20px; transition: 0.2s; display: flex; align-items: center; gap: 10px;
}
.btn-google:hover { background: #e6edf3; transform: scale(1.05); }

/* ESTILOS DEL PORTAFOLIO */
.hdr{background:linear-gradient(135deg,#1a2332,#0d1117);padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:1.15rem;color:var(--b);font-weight:700}
.hdr-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.rate-box{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:5px 11px; transition: 0.3s;}
.rate-box.updating { border-color: var(--g); box-shadow: 0 0 5px var(--g); }
.rate-box label{color:var(--sub);font-size:.72rem;white-space:nowrap}
.hdr input{background:transparent;border:none;color:var(--b);font-weight:700;font-size:.88rem;width:85px;outline:none;text-align:right}
.btn{border:none;padding:7px 14px;border-radius:7px;cursor:pointer;font-size:.78rem;font-weight:600;transition:.2s}

.btn-undo { background: #21262d; color: var(--sub); border: 1px solid var(--border); font-size: .72rem; padding: 5px 10px; }
.btn-undo:hover { background: var(--border); color: #fff; }
.btn-logout { background: #f7816622; color: var(--r); border: 1px solid #f7816655; font-size: .72rem; padding: 5px 10px; }
.btn-logout:hover { background: var(--r); color: #fff; }

.btn-add { background: var(--g); color: #fff; border: none; font-size: .75rem; padding: 5px 12px; font-weight: 600; box-shadow: 0 0 5px rgba(63,185,80,0.3);}
.btn-add:hover { background: #2ea043; box-shadow: 0 0 10px rgba(63,185,80,0.6); transform: scale(1.03); }
.btn-ai{background:#1f6feb;color:#fff}.btn-ai:hover{background:#388bfd}.btn-ai:disabled{background:#21262d;color:var(--sub);cursor:not-allowed}

main{padding:14px 18px;max-width:1300px;margin:0 auto}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:12px}
.card .lbl{font-size:.68rem;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.card .val{font-size:1.2rem;font-weight:700}
.card .s2{font-size:.72rem;color:var(--sub);margin-top:2px}
.g{color:var(--g)}.r{color:var(--r)}.b{color:var(--b)}

.charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.ch{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:13px}
.ch h3{font-size:.72rem;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;margin-bottom:9px}
.ch-wrap{height:200px;position:relative}

.broker{background:var(--card);border:1px solid var(--border);border-radius:9px;margin-bottom:12px;overflow:hidden}
.bhdr{padding:9px 14px;font-weight:700;font-size:.82rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.bhdr.sw{color:#79c0ff;background:linear-gradient(90deg,#1a3a5c22,transparent)}
.bhdr.xt{color:#56d364;background:linear-gradient(90deg,#1a5c3a22,transparent)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{color:var(--sub);padding:6px 8px;text-align:right;font-weight:500;font-size:.68rem;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);white-space:nowrap}
th:first-child,th:nth-child(2){text-align:left}
td{padding:4px 5px;border-bottom:1px solid #0d111766;text-align:right;white-space:nowrap}
td:first-child{text-align:left;padding-left:10px}
tr:hover td{background:#1c212855}
tr.total-row td{font-weight:700;background:#0d111755;border-top:1px solid var(--border);border-bottom:none;font-size:.8rem}

.ci{background:#0d1117;border:1px solid var(--border);color:#e6edf3;border-radius:5px;padding:4px 7px;width:90px;text-align:right;font-size:.8rem;outline:none;transition:.15s}
.ci:focus{border-color:var(--b);background:#0d1c2e}
.ci.ticker{width:85px;text-align:left;text-transform:uppercase;font-weight:700;color:var(--b)}
.pending .ci{color:var(--sub)}
.pending .ticker-cell{color:var(--sub);font-style:italic}

.action-btns { display: flex; gap: 4px; justify-content: flex-end; align-items: center; }
.icon-btn { background:transparent; border:none; cursor:pointer; padding:2px 5px; font-size:.9rem; transition:.15s; opacity: 0.7; }
.icon-btn:hover { opacity: 1; transform: scale(1.1); }
.btn-del { color: #ff4444; opacity: 1; }
.btn-del:hover { color: #ff6666; }

.badge{display:inline-block;background:#21262d;color:var(--sub);font-size:.62rem;padding:1px 5px;border-radius:9px;margin-left:4px;vertical-align:middle}
.computed{font-size:.8rem;padding:5px 8px}

.alert-glow { color: #ff3333 !important; font-weight: 900 !important; text-shadow: 0 0 8px rgba(255, 0, 0, 0.8); animation: pulse-red 1.2s infinite alternate; }
@keyframes pulse-red { 0% { text-shadow: 0 0 5px rgba(255, 0, 0, 0.5); } 100% { text-shadow: 0 0 15px rgba(255, 50, 50, 1), 0 0 20px rgba(255, 0, 0, 0.8); } }

.bottom{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.sum-box,.skandia-box{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:13px}
.skandia-box{border-color:#3fb95033}
.box-title{font-size:.72rem;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #21262d22}
.sum-row:last-child{border-bottom:none;font-weight:700;padding-top:8px}
.sum-lbl{color:var(--sub);font-size:.78rem}
.sum-val{font-size:.8rem;font-weight:600}

.toast{position:fixed;bottom:18px;right:18px;background:#1f6feb;color:#fff;padding:9px 16px;border-radius:7px;font-size:.78rem;opacity:0;transition:.3s;pointer-events:none;z-index:99999}
.toast.show{opacity:1}

/* ESTILOS RESPONSIVE CELULAR */
@media (max-width: 768px) {
  body { font-size: 11px; }
  main { padding: 10px; }
  .hdr { flex-direction: column; align-items: flex-start; gap: 5px; padding: 10px; }
  .hdr-right { width: 100%; justify-content: space-between; flex-wrap: wrap; }
  .cards { grid-template-columns: repeat(2, 1fr); gap: 5px; margin-bottom: 10px; }
  .card { padding: 8px; }
  .card .lbl { font-size: 0.6rem; margin-bottom: 1px; }
  .card .val { font-size: 1rem; }
  .card .s2 { font-size: 0.65rem; }
  .charts { grid-template-columns: 1fr; gap: 10px; margin-bottom: 10px; }
  .ch-wrap { height: 180px; }
  .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 5px; }
  table th, table td { font-size: 0.75rem; padding: 4px 3px; }
  .ci { padding: 3px 5px; width: 75px; font-size: 0.75rem; }
  .ci.ticker { width: 70px; }
  .bottom { grid-template-columns: 1fr; gap: 10px; margin-bottom: 10px; }
  .sum-box, .skandia-box { padding: 8px; }
  .box-title { font-size: 0.65rem; }
  .sum-val, .ci.computable { font-size: 0.75rem; }
}
@media (max-width: 480px) { .cards { grid-template-columns: 1fr; } }
</style>
</head>

</div>

<script>
// ── CONFIGURACIÓN FINNHUB ──────────────
const FINNHUB_API_KEY = 'd72igc9r01qlfd9ncqr0d72igc9r01qlfd9ncqrg';

// ── INICIALIZAR FIREBASE (CON TUS LLAVES) ──────────────
const firebaseConfig = {
  apiKey: "AIzaSyDAPrYB2pyJ7fQcMoC72DojH1ZKdzLgKwY",
  authDomain: "mi-portafolio-cristhian.firebaseapp.com",
  databaseURL: "https://mi-portafolio-cristhian-default-rtdb.firebaseio.com",
  projectId: "mi-portafolio-cristhian",

  messagingSenderId: "857924881558",

};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
let currentUser = null;

// ── VARIABLES GLOBALES DEL PORTAFOLIO ──────────────
// Datos iniciales de ejemplo (Se usarán solo la primera vez si la nube está vacía)
let SW = [
  {id:1, t:'BABA',    qty:19,      inv:1460.91, invFormula: '1460.91', px:129.87, p:false},
  {id:2, t:'BRK-B',   qty:7.5562,  inv:2974.72, invFormula: '2974.72', px:476.19, p:false},
  {id:3, t:'CRCL',    qty:5,       inv:373.60,  invFormula: '373.60',  px:103.86, p:false},
  {id:4, t:'GRAB',    qty:473,     inv:2383.92, invFormula: '2383.92', px:3.73,   p:false},
  {id:5, t:'IBIT',    qty:18,      inv:716.04,  invFormula: '716.04',  px:40.17,  p:false},
  {id:6, t:'NU',      qty:195,     inv:2334.15, invFormula: '2334.15', px:14.32,  p:false},
  {id:7, t:'PLTR',    qty:35.2959, inv:1552.31, invFormula: '1552.31', px:154.96, p:false},
  {id:8, t:'SPYG',    qty:27.0281, inv:2135.76, invFormula: '2135.76', px:99.71,  p:false},
  {id:9, t:'TLT',     qty:21.1635, inv:1949.58, invFormula: '1949.58', px:86.84,  p:false},
  {id:10,t:'TSLA',    qty:2.1913,  inv:822.17,  invFormula: '822.17',  px:385.95, p:false},
];
let XT = [
  {id:11,t:'EIMI.UK', qty:28.2244, inv:1125.02, invFormula: '1125.02', px:46.19,  p:false},
  {id:12,t:'CSPX.UK', qty:2.8771,  inv:1885.01, invFormula: '1885.01', px:703.48, p:false}
];
let nid = 20;
let dChart=null, bChart=null;
let saveTimeout = null;
const COLS=['#58a6ff','#3fb950','#f78166','#d2a8ff','#ffa657','#79c0ff','#56d364','#ff7b72','#bc8cff','#ffb347','#63d3fb','#a8dadc'];

const f = (n,d=2) => isNaN(n)?'—':new Intl.NumberFormat('es-CO',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n);
const fCOP = n => new Intl.NumberFormat('es-CO',{minimumFractionDigits:0,maximumFractionDigits:0}).format(n)+' COP';
const fU = (n,d=2) => { const s='$'+f(Math.abs(n),d); return `<span class="${n<0?'r':''}">${n<0?'-':''}${s}</span>`; };
const fP = (n, isAlert) => `<span class="${isAlert ? 'alert-glow' : (n>=0?'g':'r')}">${n>=0?'+':''}${f(n,2)}%</span>`;
const r = (s,d=4) => parseFloat(String(s).replace(/[^0-9.\-]/g,''))||0;
const rate = () => r(document.getElementById('rateInput').value)||4180;

// ── MANEJO DE SESIÓN FIREBASE ──────────────
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
    loadFromFirebase();
  } else {

    document.getElementById('login-screen').style.display = 'flex';

function iniciarSesion() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(error => {
    console.error("Error iniciando sesión:", error);
    alert("Hubo un error al iniciar sesión. Revisa los dominios autorizados en Firebase.");
  });
}

function cerrarSesion() {
  auth.signOut();
}

function loadFromFirebase() {
  if (!currentUser) return;
  db.ref('users/' + currentUser.uid).once('value').then(snapshot => {
    if (snapshot.exists()) {
      const data = snapshot.val();
      if (data.SW) SW = data.SW;
      if (data.XT) XT = data.XT;
      if (data.rate) document.getElementById('rateInput').value = data.rate;
      if (data.skInv) {
        document.getElementById('skInv').dataset.raw = data.skInv;
        document.getElementById('skInv').value = new Intl.NumberFormat('es-CO').format(data.skInv);
      }
      if (data.skCur) {
        document.getElementById('skCur').dataset.raw = data.skCur;
        document.getElementById('skCur').value = new Intl.NumberFormat('es-CO').format(data.skCur);
      }
      if (data.ts) document.getElementById('lastSaved').textContent = 'Sincronizado: '+new Date(data.ts).toLocaleTimeString('es-CO');
      showToast('☁️ Nube sincronizada');
    } else {
      // Es usuario nuevo, guardamos los de prueba iniciales
      saveDataToFirebase();
    }
    fetchRealTimeData(); 
    recalc();
  }).catch(e => console.error("Error leyendo DB:", e));
}

function saveDataToFirebase() {
  if (!currentUser) return;
  const dataObj = {
    SW, XT, 
    rate: document.getElementById('rateInput').value,
    skInv: document.getElementById('skInv').dataset.raw || "14613200",
    skCur: document.getElementById('skCur').dataset.raw || "12627217",
    ts: new Date().toISOString()
  };
  
  db.ref('users/' + currentUser.uid).set(dataObj)
    .then(() => {
      document.getElementById('lastSaved').textContent = 'Guardado en la nube: ' + new Date().toLocaleTimeString('es-CO');
    })
    .catch(e => showToast('❌ Error guardando en nube'));
}

// Reemplazamos el localStorage antiguo para que llame a Firebase
function saveData() { saveDataToFirebase(); }

// ── LÓGICA DE FÓRMULA TIPO EXCEL (USD) ──────────────
function calculateSumFromFormula(formulaString) {
  if (!formulaString || formulaString.trim() === '') return 0;
  let cleanedFormula = formulaString.replace(/\s/g, '').replace(',', '.').replace(/[^\d.+\-]/g, '');
  const parts = cleanedFormula.split('+');
  let sum = 0;
  parts.forEach(part => { sum += (parseFloat(part) || 0); });
  return sum;
}

function investFocus(inputEl) {
  saveStateToHistory();
  const rawFormula = inputEl.getAttribute('data-raw-formula');
  if (rawFormula) { inputEl.value = rawFormula; }
}

function investBlur(inputEl, tid, id) {
  const inputValue = inputEl.value; 
  const sum = calculateSumFromFormula(inputValue);

  inputEl.setAttribute('data-raw-formula', inputValue); 
  inputEl.value = f(sum); 
  inputEl.title = `Fórmula: ${inputValue}`; 

  const arr = (tid === 'sw') ? SW : XT;
  const row = arr.find(x => x.id === id);
  if (row) {
    row.inv = sum;
    row.invFormula = inputValue; 
  }
  recalc();
}

// ── LÓGICA DE SKANDIA (AUTO-FORMATO COP) ──────────────
function skFocus(el) {
  saveStateToHistory();
  el.value = el.dataset.raw || el.value.replace(/\./g, '');
}

function skBlur(el) {
  let cleanStr = String(el.value).replace(/\./g, '');
  let rawVal = parseFloat(cleanStr) || 0;
  el.dataset.raw = rawVal;
  el.value = new Intl.NumberFormat('es-CO').format(rawVal);
  recalc();
}

// ── LÓGICA DE HISTORIAL (DESHACER / UNDO) ──────────────
let historyStack = [];
function saveStateToHistory() {
  const currentState = JSON.stringify({
    SW: JSON.parse(JSON.stringify(SW)), 
    XT: JSON.parse(JSON.stringify(XT)),
    rate: document.getElementById('rateInput').value,
    skInv: document.getElementById('skInv').dataset.raw || "14613200",
    skCur: document.getElementById('skCur').dataset.raw || "12627217"
  });
  
  if (historyStack.length === 0 || historyStack[historyStack.length - 1] !== currentState) {
    historyStack.push(currentState);
    if (historyStack.length > 20) historyStack.shift();
  }
}

function undo() {
  if (historyStack.length === 0) { showToast('Nada más para deshacer'); return; }
  
  const prevStateJSON = historyStack.pop();
  const prevState = JSON.parse(prevStateJSON);

  SW = prevState.SW;
  XT = prevState.XT;
  document.getElementById('rateInput').value = prevState.rate;
  
  document.getElementById('skInv').dataset.raw = prevState.skInv;
  document.getElementById('skInv').value = new Intl.NumberFormat('es-CO').format(prevState.skInv);
  document.getElementById('skCur').dataset.raw = prevState.skCur;
  document.getElementById('skCur').value = new Intl.NumberFormat('es-CO').format(prevState.skCur);

  recalc();
  showToast('↩️ Acción deshecha');
}

document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
    if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
    e.preventDefault();
    undo();
  }
});

// ── CÁLCULOS Y RENDERIZADO ──────────────
function calc(row) {
  if (row.inv === undefined) { row.inv = row.qty * (row.avg || 0); }
  const cur = row.qty * row.px; 
  const avg = row.qty > 0 ? row.inv / row.qty : 0;
  row.avg = avg; 
  const gl = row.inv > 0 ? ((cur - row.inv) / row.inv) * 100 : 0;
  const pnl = cur - row.inv;
  return { ...row, cur, gl, pnl };
}

function renderTable(data, tid) {
  const rows = data.map(calc);
  const active = rows.filter(x=>x.qty>0);

  const thead = `<thead><tr>
    <th style="text-align:left">Activo</th>
    <th style="text-align:left">Cant.</th>
    <th>Precio Prom</th>
    <th>Precio Actual</th>
    <th>Valor USD</th>
    <th>Invertido USD</th>
    <th>% G/L</th>
    <th>Profit</th>
    <th></th>
  </tr></thead>`;

  const tbody = rows.map(row => {
    const isPend = row.p || row.qty===0;
    const isAlert = !isPend && row.gl <= -10; 

    return `<tr class="${isPend?'pending':''}">
      <td class="ticker-cell">
        <input class="ci ticker ${isAlert ? 'alert-glow' : ''}" value="${row.t}" onfocus="saveStateToHistory()" onblur="upd('${tid}',${row.id},'t',this.value)">
        ${isPend?'<span class="badge">próximo</span>':''}
      </td>
      <td><input class="ci" value="${row.qty}" onfocus="saveStateToHistory()" onblur="upd('${tid}',${row.id},'qty',this.value)"></td>
      <td class="computed">${isPend?'<span style="color:var(--sub)">—</span>':fU(row.avg)}</td>
      <td class="computed ${isAlert ? 'alert-glow' : ''}" style="font-weight: 700;">${row.px}</td>
      <td class="computed">${isPend?'<span style="color:var(--sub)">—</span>':fU(row.cur)}</td>
      <td>
        <input type="text" class="ci invested-usd" value="${f(row.inv)}" data-raw-formula="${row.invFormula || row.inv}" 
               onfocus="investFocus(this)" onblur="investBlur(this, '${tid}', ${row.id})" title="Fórmula: ${row.invFormula || row.inv}">
      </td>
      <td class="computed">${isPend?'<span style="color:var(--sub)">—</span>':fP(row.gl, isAlert)}</td>
      <td class="computed">${isPend?'<span style="color:var(--sub)">—</span>':fU(row.pnl)}</td>
      <td class="action-btns">
        <button class="icon-btn" onmousedown="sellRow('${tid}',${row.id})" title="Registrar Venta">💰</button>
        <button class="icon-btn btn-del" onmousedown="delRow('${tid}',${row.id})" title="Eliminar Activo">✕</button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('tbl-'+tid).innerHTML = thead+'<tbody>'+tbody+'</tbody>';
}

function upd(tid, id, field, val) {
  const arr = tid==='sw'?SW:XT;
  const row = arr.find(x=>x.id===id);
  if (!row) return;
  row[field] = (field==='t') ? val.toUpperCase() : r(val);
  if (field==='qty' && r(val)>0) row.p = false;
  recalc();
}

function addRow(tid) {
  saveStateToHistory();
  const arr = tid==='sw'?SW:XT;
  arr.push({id:nid++, t:'', qty:0, inv:0, px:0, p:true});
  recalc();
}

function delRow(tid, id) {
  saveStateToHistory();
  if (tid==='sw') SW = SW.filter(x=>x.id!==id);
  else            XT = XT.filter(x=>x.id!==id);
  recalc();
}

function sellRow(tid, id) {
  const arr = tid === 'sw' ? SW : XT;
  const row = arr.find(x => x.id === id);
  if (!row || row.qty <= 0) { alert('No tienes acciones para vender de este activo.'); return; }

  const qtyStr = prompt(`¿Cuántas acciones de ${row.t || 'este activo'} vas a vender?\n(Tienes ${row.qty} disponibles)`);
  if (qtyStr === null) return; 
  const sellQty = r(qtyStr);
  if (sellQty <= 0 || sellQty > row.qty) { alert('Cantidad inválida.'); return; }

  const pxStr = prompt(`¿A qué precio por acción las vendiste?`);
  if (pxStr === null) return;
  const sellPx = r(pxStr);
  if (sellPx <= 0) { alert('Precio inválido.'); return; }

  saveStateToHistory();

  const avgCost = row.inv / row.qty;
  const realizedPnL = (sellPx - avgCost) * sellQty; 

  row.qty -= sellQty;
  row.inv -= (sellQty * avgCost); 
  // Actualizamos también la fórmula para que no sume mal después
  row.invFormula = `${row.inv}`; 
  if (row.qty < 0.0001) { row.qty = 0; row.inv = 0; row.invFormula = '0'; }

  recalc();
  const estadoVenta = realizedPnL >= 0 ? 'Ganancia' : 'Pérdida';
  showToast(`✅ Venta registrada. ${estadoVenta} realizada: $${f(Math.abs(realizedPnL))} USD`);
}

function recalc() {
  renderTable(SW,'sw');
  renderTable(XT,'xt');
  renderCards();
  renderSummary();
  renderCharts();
  
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(saveData, 1000);
}

function renderCards() {
  const rt = rate();
  const sA = SW.map(calc).filter(x=>x.qty>0);
  const xA = XT.map(calc).filter(x=>x.qty>0);
  const all = [...sA,...xA];
  const tCur = all.reduce((s,x)=>s+x.cur,0);
  const tInv = all.reduce((s,x)=>s+x.inv,0);
  const tPnl = tCur-tInv;
  const tPct = tInv>0?tPnl/tInv*100:0;
  
  const rawSkCur = parseFloat(document.getElementById('skCur').dataset.raw || 12627217);
  const gC = tCur + (rawSkCur/rt);
  const best  = [...all].sort((a,b)=>b.gl-a.gl)[0];
  const worst = [...all].sort((a,b)=>a.gl-b.gl)[0];

  document.getElementById('cards').innerHTML=`
    <div class="card"><div class="lbl">Valor Total USD</div><div class="val b">$${f(tCur)}</div><div class="s2">${fCOP(tCur*rt)}</div></div>
    <div class="card"><div class="lbl">Capital Invertido</div><div class="val">$${f(tInv)}</div><div class="s2">Brokers USD</div></div>
    <div class="card"><div class="lbl">P&L Brokers</div><div class="val ${tPnl>=0?'g':'r'}">${tPnl>=0?'+':'-'} $${f(Math.abs(tPnl))}</div><div class="s2 ${tPct>=0?'g':'r'}">${tPct>=0?'+':''}${f(tPct,1)}%</div></div>
    <div class="card"><div class="lbl">Global USD (Con IBIT)</div><div class="val b">$${f(gC)}</div><div class="s2">Suma Skandia</div></div>
    <div class="card"><div class="lbl">🏆 Mejor activo</div><div class="val g">${best?best.t:'—'}</div><div class="s2 g">${best?'+'+f(best.gl,1)+'%':''}</div></div>
    <div class="card"><div class="lbl">⚠️ Más rezagado</div><div class="val r">${worst?worst.t:'—'}</div><div class="s2 r">${worst?f(worst.gl,1)+'%':''}</div></div>`;
}

function renderSummary() {
  const rt = rate();
  const sA = SW.map(calc).filter(x=>x.qty>0);
  const xA = XT.map(calc).filter(x=>x.qty>0);
  const sI=sA.reduce((s,x)=>s+x.inv,0), sC=sA.reduce((s,x)=>s+x.cur,0);
  const xI=xA.reduce((s,x)=>s+x.inv,0), xC=xA.reduce((s,x)=>s+x.cur,0);
  const tI=sI+xI, tC=sC+xC;
  
  const totalActualCOP = tC * rt;
  const totalInvertidoCOP = tI * rt; 

  let skI = parseFloat(document.getElementById('skInv').dataset.raw || 14613200);
  if (skI <= 0) { skI = 14613200; document.getElementById('skInv').dataset.raw = skI; document.getElementById('skInv').value = new Intl.NumberFormat('es-CO').format(skI); }
  let skC = parseFloat(document.getElementById('skCur').dataset.raw || 12627217);

  document.getElementById('sum-content').innerHTML=`
    <div class="sum-row"><span class="sum-lbl">🇺🇸 Schwab — Invertido</span><span class="sum-val">$${f(sI)}</span></div>
    <div class="sum-row"><span class="sum-lbl">🇺🇸 Schwab — Actual</span><span class="sum-val">${fU(sC)}</span></div>
    <div style="margin:5px 0;border-top:1px solid var(--border)"></div>
    <div class="sum-row"><span class="sum-lbl">🇪🇺 XTB — Invertido</span><span class="sum-val">$${f(xI)}</span></div>
    <div class="sum-row"><span class="sum-lbl">🇪🇺 XTB — Actual</span><span class="sum-val">${fU(xC)}</span></div>
    <div style="margin:5px 0;border-top:1px solid var(--border)"></div>
    <div class="sum-row"><span class="sum-lbl">Total Invertido USD</span><span class="sum-val">$${f(tI)}</span></div>
    <div class="sum-row"><span class="sum-lbl">Total Invertido COP</span><span class="sum-val">${fCOP(totalInvertidoCOP)}</span></div>
    <div class="sum-row"><span class="sum-lbl">Total Actual USD</span><span class="sum-val b">${fU(tC)}</span></div>
    <div class="sum-row"><span class="sum-lbl">Total Actual COP (Dinámico)</span><span class="sum-val b">${fCOP(totalActualCOP)}</span></div>`;

  const skPnl=skC-skI, skRet=skI>0?skPnl/skI*100:0;
  document.getElementById('skPnl').innerHTML=`<span class="${skPnl>=0?'g':'r'}">${skPnl>=0?'+':'-'} ${fCOP(Math.abs(skPnl))}</span>`;
  document.getElementById('skRet').innerHTML=`<span class="${skRet>=0?'g':'r'}">${skRet>=0?'+':''}${f(skRet,2)}%</span>`;
}

function renderCharts() {
  const all = [...SW.map(calc),...XT.map(calc)].filter(x=>x.qty>0);
  const labels = all.map(x=>x.t);
  const vals = all.map(x=>x.cur);
  const gls  = all.map(x=>x.gl);

  const totalVal = vals.reduce((a, b) => a + b, 0);
  const labelsPct = labels.map((t, i) => {
    const pct = totalVal > 0 ? (vals[i] / totalVal * 100).toFixed(1) : 0;
    return `${t} (${pct}%)`;
  });

  if (dChart) dChart.destroy();
  dChart = new Chart(document.getElementById('donut'),{
    type:'doughnut',
    data:{labels: labelsPct, datasets:[{data:vals,backgroundColor:COLS.slice(0,labels.length),borderWidth:2,borderColor:'#161b22'}]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{position:'right',labels:{color:'#e6edf3',font:{size:12.5, family: "'Segoe UI', sans-serif"},boxWidth:12,padding:14}}}
    }
  });

  if (bChart) bChart.destroy();
  bChart = new Chart(document.getElementById('bar'),{
    type:'bar',
    data:{labels,datasets:[{data:gls,backgroundColor:gls.map(g=>g>=0?'#3fb95055':'#f7816655'),borderColor:gls.map(g=>g>=0?'#3fb950':'#f78166'),borderWidth:1}]},
    options:{
      responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#e6edf3',font:{size:11}},grid:{color:'#21262d'}},y:{ticks:{color:'#8b949e',callback:v=>v+'%'},grid:{color:'#21262d'}}}
    }
  });
}

async function fetchRealTimeData() {
  if (document.activeElement && document.activeElement.tagName === 'INPUT') { return; }
  if (!currentUser) return; // No actualizar si no ha iniciado sesión

  document.getElementById('rateBox').classList.add('updating');
  try {
    const trmRes = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
    const trmData = await trmRes.json();
    if(trmData.rates && trmData.rates.COP) {
       document.getElementById('rateInput').value = trmData.rates.COP.toFixed(2);
    }
  } catch(e) { console.log('Error TRM', e); }

  const fetchPrice = async (ticker) => {
    const sym = ticker.includes('.UK') ? ticker.replace('.UK', '.L') : ticker; 
    const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${FINNHUB_API_KEY}`);
    const data = await res.json();
    return data.c; 
  };

  try {
    for (let row of SW) if (row.t) { const p = await fetchPrice(row.t); if(p) row.px = p; }
    for (let row of XT) if (row.t) { const p = await fetchPrice(row.t); if(p) row.px = p; }
  } catch(e) { console.log('Error Stocks', e); }

  recalc();
  document.getElementById('rateBox').classList.remove('updating');
}

setInterval(fetchRealTimeData, 60000);

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
</script>
